<!DOCTYPE html>
<html>
<head>
    <title>Website</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='login_style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Sign in</h1>
        <form action="/login/result" method="post">
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" name="user_username" id="username" class="form-control">
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" name="user_password" id="password" class="form-control">
            </div>
            <input type="submit" value="Login" class="btn btn-primary">
        </form>
    </div>
</body>
</html>
